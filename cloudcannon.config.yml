      - key: tags
        type: array
        label: Tags
      - key: related
        type: array
        label: Related Posts
        default: []
      - key: image
        type: image
        label: Cover Image
        default: ""
      - key: seoTitle
        type: text
        label: SEO Title
      - key: seoDescription
        type: textarea
