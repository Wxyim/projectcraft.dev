      - key: pubDate
        type: date
        label: Publish Date
      - key: updatedDate
        type: date
        label: Last Updated
        default: ""
      - key: draft
        type: checkbox
        label: Draft
        default: false
      - key: featured
        type: checkbox
        label: Featured
        default: false
      - key: order
        type: number
        label: Sort Order
        default: ""
      - key: tags
        type: array
        label: Tags
      - key: related
        type: array
        label: Related Posts
        default: []
      - key: image
        type: image
        label: Cover Image
        default: ""
      - key: seoTitle
        type: text
        label: SEO Title
      - key: seoDescription
        type: textarea
        label: SEO Description
      - key: status
        type: select
        label: Growth Stage
        options:
          - seedling
          - budding
          - evergreen
        default: seedling
    sort:
      key: pubDate
      direction: desc

# ---------------------------------------------------------------------------
# CloudCannon site-level settings
# ---------------------------------------------------------------------------
paths:
  static: public
  uploads: public/uploads

# Build config for CloudCannon's built-in staging
build:
  command: npm run build
  output: dist
