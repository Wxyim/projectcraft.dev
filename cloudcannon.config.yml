paths:
  uploads: public/uploads
  static: public
collections_config:
  articles:
    path: src/content/articles
    icon: article
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  garden:
    path: src/content/garden
    icon: cards
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  notes:
    path: src/content/notes
    icon: notes
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  projects:
    path: src/content/projects
    icon: eject
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  resources:
    path: src/content/resources
    icon: gesture
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  weekly:
    path: src/content/weekly
    icon: reply
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
base_url: https://projectcraft.dev
editor:
  default_path: /src/content/articles
timezone: Etc/UTC
_defaults:
  input_options:
    markdown: true
collections:
  articles:
    name: 📝 Articles
    path: src/content/articles
    output: true
    filter: strict
    create:
      path: '{title|slugify}.md'
    schema:
      - key: title
        type: text
        label: Title
      - key: description
        type: textarea
        label: Description
      - key: pubDate
        type: date
        label: Publish Date
      - key: updatedDate
        type: date
        label: Last Updated
        default: ''
      - key: draft
        type: checkbox
        label: Draft
        default: false
      - key: featured
        type: checkbox
        label: Featured
        default: false
      - key: order
        type: number
        label: Sort Order
        default: ''
      - key: tags
        type: array
        label: Tags
      - key: related
        type: array
        label: Related Posts
        default: []
      - key: image
        type: image
        label: Cover Image
        default: ''
      - key: seoTitle
        type: text
        label: SEO Title
      - key: seoDescription
        type: textarea
        label: SEO Description
    sort:
      key: pubDate
      direction: desc
  notes:
    name: 📔 Notes
    path: src/content/notes
    output: true
    filter: strict
    create:
