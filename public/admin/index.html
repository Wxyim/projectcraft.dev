<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — projectcraft.dev</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-y: auto !important;
    }

    /*
     * When Decap CMS auth fails, an inline error message is rendered inside
     * the login card, which pushes the "Back to our site" link and the Decap
     * CMS logo together until they overlap.
     *
     * Decap mounts its React root into <div id="nc-root"> on document.body.
     * The login page uses a centered flex column that can clip overflow when
     * an error message adds extra height. The fixes below allow the page to
     * grow and scroll instead of clipping its bottom elements.
     */

    /* Allow the page to scroll when content exceeds the viewport */
    html {
      overflow-y: auto !important;
    }

    /* Decap sets height:100vh on #nc-root for the dashboard layout. Override
     * so the login page can grow beyond the viewport when an inline error is
     * shown, while still filling the viewport at minimum. */
    #nc-root {
      display: block;
      height: auto !important;
      min-height: 100vh !important;
      box-sizing: border-box;
    }

    body.decap-login-overflow #nc-root {
      padding-bottom: 6rem !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  <script>
    // Set the site URL for Decap CMS
    CMS.registerPreviewStyle('/admin/preview.css');

    // Only add extra bottom space when the login footer is actually present.
    // This keeps the dashboard layout unchanged while preventing the error
    // message from colliding with the "Back to our site" footer on auth
    // failures.
    (function () {
      var root = null;

      function updateOverflowClass() {
        if (!root) root = document.getElementById('nc-root');
        if (!root) return;

        var text = root.textContent || '';
        var needsExtraSpace = /Back to our site|Decap CMS/i.test(text);
        document.body.classList.toggle('decap-login-overflow', needsExtraSpace);
      }

      updateOverflowClass();

      var observer = new MutationObserver(updateOverflowClass);
      observer.observe(document.body, { childList: true, subtree: true, characterData: true });
    })();
  </script>
</body>
</html>
