# Decap CMS configuration for projectcraft.dev
# Docs: https://decapcms.org/docs/configuration-options/

site_url: https://projectcraft.dev
display_url: https://projectcraft.dev
logo_url: https://projectcraft.dev/logo.png
locale: zh_CN

# ---------------------------------------------------------------------------
# Backend — GitHub OAuth via a same-origin proxy on this Worker
#
# Decap's github backend REQUIRES an OAuth proxy (it has no client-only
# implicit/pkce flow for GitHub — those only exist for GitLab/Azure/Gitea).
# base_url + auth_endpoint point Decap at our own /api/oauth endpoint, which
# speaks the Netlify-authenticator handshake protocol Decap expects.
#
# Setup (one-time, in GitHub):
#   https://github.com/settings/developers → your OAuth App →
#   Authorization callback URL = https://projectcraft.dev/api/oauth
# ---------------------------------------------------------------------------
backend:
  name: github
  repo: Wxyim/projectcraft.dev
  branch: main
  base_url: https://projectcraft.dev
  auth_endpoint: api/oauth

# ---------------------------------------------------------------------------
# Media / uploads
# ---------------------------------------------------------------------------
media_folder: public/uploads
public_folder: /uploads

# ---------------------------------------------------------------------------
# Optional: use editorial workflow (drafts → review → publish)
# ---------------------------------------------------------------------------
publish_mode: editorial_workflow

# ---------------------------------------------------------------------------
# Collections
# ---------------------------------------------------------------------------
collections:
  - name: articles
    label: "📝 Articles"
    label_singular: Article
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    sortable_fields:
      - title
      - pubDate
    view_groups:
      - label: Year
        field: pubDate
        pattern: \d{4}
    fields:
      - {label: "Title", name: title, widget: string}
      - {label: "Description", name: description, widget: text, required: false}
      - {label: "Publish Date", name: pubDate, widget: datetime, format: "YYYY-MM-DD", time_format: false}
      - {label: "Last Updated", name: updatedDate, widget: datetime, format: "YYYY-MM-DD", time_format: false, required: false}
      - {label: "Draft", name: draft, widget: boolean, default: false, required: false}
      - {label: "Featured", name: featured, widget: boolean, default: false, required: false}
      - {label: "Sort Order", name: order, widget: number, required: false, value_type: int}
      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
        field: {label: Tag, name: tag, widget: string}
      - label: "Related Posts"
        name: related
        widget: list
        required: false
        default: []
        field: {label: Slug, name: slug, widget: string}
        hint: "e.g. notes/markdown-first or articles/some-post"
      - {label: "Cover Image", name: image, widget: image, required: false}
      - {label: "SEO Title", name: seoTitle, widget: string, required: false}
      - {label: "SEO Description", name: seoDescription, widget: text, required: false}
      - {label: "Body", name: body, widget: markdown}

